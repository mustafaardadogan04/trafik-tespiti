# ByteTrack — tekrar saymayi azaltmak icin ayarlandi.
# track_buffer buyutuldu (30 -> 90): bir nesne birkac kare kaybolsa bile izi
# saklanir, tekrar gorununce ayni ID'ye baglanir -> yeni ID + tekrar sayim azalir.
tracker_type: bytetrack
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 90
match_thresh: 0.8
fuse_score: true
